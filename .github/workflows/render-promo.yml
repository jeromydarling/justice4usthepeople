name: Render promo video

# Generates the 60s promo video by:
#   1. calling the ElevenLabs Music API for the backing track
#   2. rendering the hyperframes composition at /promo/index.html to MP4
#   3. opening a pull request with the rendered file at public/promo/promo.mp4
#
# Manual-only — re-run after editing promo/index.html or the script.
#
# Required GitHub secrets:
#   ELEVENLABS_API_KEY — ElevenLabs API key (Music + TTS access)

on:
  workflow_dispatch:
    inputs:
      regen_music:
        description: "Regenerate music.wav from ElevenLabs"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: render-promo
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # hyperframes (>=0.5) requires Node 22.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install repo dependencies
        run: npm ci

      - name: System deps for headless rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Stage assets into promo/assets/
        # Hyperframes renders relative paths from inside the project dir.
        # The skyline backdrop prefers a user-provided AI illustration
        # (drop a .png or .jpg into public/promo/) and falls back to the
        # bundled SVG converted to PNG.
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y imagemagick
          mkdir -p promo/assets
          cp public/brand/logo-loon.png promo/assets/

          if [ -f public/promo/skyline.png ]; then
            cp public/promo/skyline.png promo/assets/skyline-bg.png
            echo "Using public/promo/skyline.png"
          elif [ -f public/promo/skyline.jpg ]; then
            convert public/promo/skyline.jpg promo/assets/skyline-bg.png
            echo "Using public/promo/skyline.jpg (converted to PNG)"
          else
            convert -density 120 -background "#0e1735" \
              public/promo/skyline.svg \
              -resize 1920x1080^ -gravity center -extent 1920x1080 \
              promo/assets/skyline-bg.png
            echo "Using bundled SVG fallback"
          fi
          ls -lh promo/assets/

      - name: Generate music from ElevenLabs
        if: ${{ inputs.regen_music }}
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -z "$ELEVENLABS_API_KEY" ]; then
            echo "::warning::ELEVENLABS_API_KEY not set — skipping music generation."
            echo "::warning::Render will proceed without a music track."
            exit 0
          fi
          npm run -s promo:music

      - name: Render with hyperframes
        # No --input flag — hyperframes uses /promo as the project dir,
        # finds index.html + meta.json, and writes the MP4 under ./out/.
        working-directory: ./promo
        run: |
          npx -y hyperframes render
          echo "--- after render ---"
          find . -maxdepth 3 -type f -name "*.mp4" -print

      - name: Move rendered MP4 to /public/promo/
        run: |
          mkdir -p public/promo
          # Find the first MP4 produced by hyperframes (filename varies by version).
          MP4=$(find promo -maxdepth 3 -type f -name "*.mp4" | head -n 1)
          if [ -z "$MP4" ]; then
            echo "::error::No MP4 produced by hyperframes."
            exit 1
          fi
          mv "$MP4" public/promo/promo.mp4
          ls -lh public/promo/

      - name: Commit & push the rendered video to a new branch
        # We avoid peter-evans/create-pull-request to skip the repo's
        # "Allow GitHub Actions to create and approve pull requests" setting.
        # Just push the branch — open the PR with one click using the URL
        # printed at the end of this step.
        run: |
          BRANCH="render-promo/${{ github.run_id }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"

          # Stage only the artifacts we care about; ignore everything else.
          git add public/promo/promo.mp4 || true
          [ -f promo/music.wav ] && git add promo/music.wav || true

          if git diff --cached --quiet; then
            echo "::error::Nothing was staged — render produced no new files."
            exit 1
          fi

          git commit -m "promo: rendered video ${{ github.run_id }}"
          git push -u origin "$BRANCH"

          PR_URL="https://github.com/${{ github.repository }}/compare/main...$BRANCH?expand=1"
          echo "::notice title=Promo render complete::Branch pushed. Open the PR here: $PR_URL"
          {
            echo "## Promo video rendered"
            echo
            echo "Branch: \`$BRANCH\`"
            echo
            echo "[**Open the PR →**]($PR_URL)"
          } >> "$GITHUB_STEP_SUMMARY"
