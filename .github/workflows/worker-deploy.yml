name: Deploy forms Worker

# Deploys the Cloudflare Worker that handles form submissions.
# Triggered automatically when anything in /worker changes on main.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN  — Workers > Edit token from CF dashboard
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#   WORKER_GITHUB_PAT     — fine-grained PAT for the Worker to create issues
#                           in your private submissions repo (Issues: read+write)

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pre-flight env summary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_GITHUB_PAT: ${{ secrets.WORKER_GITHUB_PAT }}
        run: |
          # Print which secrets are wired (without leaking values).
          echo "=== Worker deploy env summary ==="
          for v in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID WORKER_GITHUB_PAT; do
            if [ -n "${!v}" ]; then echo "  ✓ $v set"; else echo "  ✗ $v EMPTY"; fi
          done

      - name: Push GITHUB_TOKEN secret to the Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_GITHUB_PAT: ${{ secrets.WORKER_GITHUB_PAT }}
        run: |
          if [ -z "$WORKER_GITHUB_PAT" ]; then
            echo "WORKER_GITHUB_PAT is not set — skipping secret push."
            exit 0
          fi
          # Pipe the PAT to wrangler secret put — never echoed.
          printf '%s' "$WORKER_GITHUB_PAT" | npx --yes wrangler@3 secret put GITHUB_TOKEN

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 deploy
