<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Justice 4 Us The People">
  <title>Justice 4 Us The People — loon rising with north star</title>
  <defs>
    <radialGradient id="j4-sky" cx="50%" cy="38%" r="64%">
      <stop offset="0%" stop-color="#dde7f1"/>
      <stop offset="55%" stop-color="#88a0bd"/>
      <stop offset="100%" stop-color="#5a7493"/>
    </radialGradient>
    <linearGradient id="j4-ring-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9b9ce"/>
      <stop offset="100%" stop-color="#3e5470"/>
    </linearGradient>
  </defs>

  <!-- Sky disc -->
  <circle cx="128" cy="128" r="100" fill="url(#j4-sky)"/>
  <!-- Inner highlight ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#j4-ring-edge)" stroke-width="1.5" opacity="0.7"/>

  <!-- Outer black ring (open at top so the wings + star break through) -->
  <path d="M 64 40 A 100 100 0 1 0 192 40"
        fill="none" stroke="#0a0f15" stroke-width="14" stroke-linecap="round"/>

  <!-- North star above -->
  <g transform="translate(128 36)">
    <path d="M0,-26 L7,-8 L26,0 L7,8 L0,26 L-7,8 L-26,0 L-7,-8 Z" fill="#e1eaf3"/>
    <path d="M0,-15 L3,-1 L-3,-1 Z M0,15 L-3,1 L3,1 Z M-15,0 L-1,3 L-1,-3 Z M15,0 L1,-3 L1,3 Z" fill="#5a7493"/>
  </g>

  <!-- Right wing (feathered, rising) -->
  <path d="M 130 134
           C 156 104, 192 96, 214 118
           C 226 142, 224 178, 204 212
           L 198 216 L 196 200
           L 188 210 L 188 192
           L 178 200 L 180 180
           L 168 188 L 174 168
           L 160 174 L 168 154
           L 154 158 L 162 140
           L 148 142 L 154 128
           Z" fill="#0a0f15"/>

  <!-- Left wing (mirror) -->
  <path d="M 126 134
           C 100 104, 64 96, 42 118
           C 30 142, 32 178, 52 212
           L 58 216 L 60 200
           L 68 210 L 68 192
           L 78 200 L 76 180
           L 88 188 L 82 168
           L 96 174 L 88 154
           L 102 158 L 94 140
           L 108 142 L 102 128
           Z" fill="#0a0f15"/>

  <!-- Loon body -->
  <path d="M 128 220
           C 108 220, 98 200, 100 174
           C 102 152, 110 132, 118 118
           C 132 124, 142 132, 144 144
           C 152 162, 158 188, 156 204
           C 152 216, 142 220, 128 220 Z"
        fill="#0a0f15"/>

  <!-- Loon neck + head turning up toward the star -->
  <path d="M 118 122
           C 110 110, 110 96, 120 86
           C 130 78, 144 78, 152 86
           L 168 80
           L 178 84
           L 170 90
           L 154 92
           C 156 100, 152 110, 142 116
           Z" fill="#0a0f15"/>

  <!-- Beak tip -->
  <path d="M 168 80 L 184 78 L 176 86 L 166 86 Z" fill="#0a0f15"/>
  <path d="M 168 84 L 178 84" stroke="#0a0f15" stroke-width="0.5"/>

  <!-- Red eye -->
  <circle cx="146" cy="92" r="2.6" fill="#c62828"/>

  <!-- White belly column -->
  <g fill="#f0f4f9">
    <ellipse cx="126" cy="128" rx="2.6" ry="3"/>
    <ellipse cx="129" cy="139" rx="2.6" ry="3"/>
    <ellipse cx="126" cy="150" rx="2.6" ry="3"/>
    <ellipse cx="129" cy="161" rx="2.6" ry="3"/>
    <ellipse cx="126" cy="172" rx="2.6" ry="3"/>
    <ellipse cx="129" cy="183" rx="2.6" ry="3"/>
    <ellipse cx="127" cy="194" rx="2.4" ry="2.6"/>
  </g>

  <!-- Red tail accent -->
  <circle cx="123" cy="216" r="2.2" fill="#c62828"/>
</svg>
