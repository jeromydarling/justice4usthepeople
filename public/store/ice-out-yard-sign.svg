<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="ICE OUT! yard sign — justice4usthepeople.org">
  <title>ICE OUT! yard sign</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f15"/>
      <stop offset="50%" stop-color="#1f3a64"/>
      <stop offset="100%" stop-color="#3b6fb1"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="50%" stop-color="#bcdcf6"/>
      <stop offset="100%" stop-color="#7eb8e8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Sign panel -->
  <rect width="800" height="600" rx="6" fill="url(#bg)"/>

  <!-- Faint hand silhouettes in background -->
  <g opacity="0.18" fill="#0a1a30">
    <ellipse cx="630" cy="320" rx="170" ry="220"/>
  </g>

  <!-- QR code stub (top-left) — replace with a real QR if you want one -->
  <g transform="translate(48 48)">
    <rect width="96" height="96" fill="#fff" rx="4"/>
    <g fill="#0a0f15">
      <rect x="6" y="6" width="22" height="22"/>
      <rect x="68" y="6" width="22" height="22"/>
      <rect x="6" y="68" width="22" height="22"/>
      <rect x="12" y="12" width="10" height="10" fill="#fff"/>
      <rect x="74" y="12" width="10" height="10" fill="#fff"/>
      <rect x="12" y="74" width="10" height="10" fill="#fff"/>
      <rect x="36" y="8"  width="6" height="6"/>
      <rect x="48" y="8"  width="6" height="6"/>
      <rect x="36" y="20" width="6" height="6"/>
      <rect x="56" y="20" width="6" height="6"/>
      <rect x="36" y="32" width="6" height="6"/>
      <rect x="50" y="32" width="6" height="6"/>
      <rect x="62" y="32" width="6" height="6"/>
      <rect x="42" y="44" width="6" height="6"/>
      <rect x="56" y="44" width="6" height="6"/>
      <rect x="68" y="44" width="6" height="6"/>
      <rect x="36" y="56" width="6" height="6"/>
      <rect x="48" y="56" width="6" height="6"/>
      <rect x="62" y="56" width="6" height="6"/>
      <rect x="36" y="68" width="6" height="6"/>
      <rect x="50" y="68" width="6" height="6"/>
      <rect x="62" y="68" width="6" height="6"/>
      <rect x="74" y="68" width="6" height="6"/>
    </g>
  </g>

  <!-- ICE -->
  <g filter="url(#shadow)">
    <text x="400" y="280" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="180" font-weight="900"
          fill="url(#ice)" stroke="#0a0f15" stroke-width="6"
          letter-spacing="6">ICE</text>
  </g>

  <!-- OUT! -->
  <g filter="url(#shadow)">
    <text x="400" y="450" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="170" font-weight="900"
          fill="url(#ice)" stroke="#0a0f15" stroke-width="6"
          letter-spacing="6">OUT!</text>
  </g>

  <!-- Drips -->
  <g fill="url(#ice)" stroke="#0a0f15" stroke-width="3">
    <path d="M 250 305 Q 248 340 254 360 Q 260 372 256 380 Z"/>
    <path d="M 320 305 Q 318 330 324 348 Q 330 360 326 366 Z"/>
    <path d="M 410 305 Q 408 350 414 372 Q 420 384 416 392 Z"/>
    <path d="M 490 305 Q 488 332 494 350 Q 500 362 496 368 Z"/>
    <path d="M 560 305 Q 558 342 564 360 Q 570 372 566 380 Z"/>

    <path d="M 240 480 Q 238 510 244 528 Q 250 540 246 548 Z"/>
    <path d="M 330 480 Q 328 522 334 542 Q 340 552 336 560 Z"/>
    <path d="M 420 480 Q 418 510 424 528 Q 430 540 426 548 Z"/>
    <path d="M 510 480 Q 508 524 514 544 Q 520 554 516 562 Z"/>
    <path d="M 590 470 Q 588 506 594 522 Q 602 535 598 540 Z"/>

    <circle cx="600" cy="498" r="14"/>
  </g>

  <!-- Site URL -->
  <text x="760" y="558" text-anchor="end"
        font-family="Inter, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#eaf4ff">
    justice4usthepeople.org
  </text>
</svg>
